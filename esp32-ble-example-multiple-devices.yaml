substitutions:
  name: lolan-bms-ble
  bms0: "${name} bms0"
  bms1: "${name} bms1"
  device_description: "Monitor a Lolan Battery Management System via BLE"
  external_components_source: github://syssi/esphome-lolan-bms@main
  bms0_mac_address: c8:47:8c:e8:82:09
  bms1_mac_address: c8:47:8c:e8:82:10

esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-lolan-bms"
    version: 1.3.0
  devices:
    - id: device0
      name: "${bms0}"
    - id: device1
      name: "${bms1}"

esp32:
  board: wemos_d1_mini32
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  platform: esphome

logger:
  level: DEBUG

# If you don't use Home Assistant please remove this `api` section and uncomment the `mqtt` component!
api:
  reboot_timeout: 0s

# mqtt:
#   broker: !secret mqtt_host
#   username: !secret mqtt_username
#   password: !secret mqtt_password
#   id: mqtt_client

esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - mac_address: ${bms0_mac_address}
    id: client0
  - mac_address: ${bms1_mac_address}
    id: client1

lolan_bms_ble:
  - ble_client_id: client0
    id: bms0
    password: 12345678
    update_interval: 10s
  - ble_client_id: client1
    id: bms1
    password: 12345678
    update_interval: 10s

binary_sensor:
  - platform: lolan_bms_ble
    lolan_bms_ble_id: bms0
    charging:
      name: "charging"
      device_id: device0
    discharging:
      name: "discharging"
      device_id: device0

  - platform: lolan_bms_ble
    lolan_bms_ble_id: bms1
    charging:
      name: "charging"
      device_id: device1
    discharging:
      name: "discharging"
      device_id: device1

button:
  - platform: lolan_bms_ble
    lolan_bms_ble_id: bms0
    retrieve_settings:
      name: "retrieve settings"
      device_id: device0
    factory_reset:
      name: "factory reset"
      device_id: device0
    reset_charging_cycles:
      name: "reset charging cycles"
      device_id: device0
    reset_total_charged_capacity:
      name: "reset total charged capacity"
      device_id: device0
    reset_total_discharged_capacity:
      name: "reset total discharged capacity"
      device_id: device0

  - platform: lolan_bms_ble
    lolan_bms_ble_id: bms1
    retrieve_settings:
